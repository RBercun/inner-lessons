<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register · Inner Lessons</title>
  <meta name="description" content="Register for Inner Lessons." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream:      #f7f1e7;
      --ink:        #3a2f28;
      --ink-soft:   #6b5d52;
      --terracotta: #c66b4a;
      --gold:       #d9a441;
      --line:       #e2d6c4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: var(--cream);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand {
      display: inline-flex; align-items: center; gap: 11px;
      font-family: 'Fraunces', Georgia, serif; font-size: 1.4rem; font-weight: 600;
      letter-spacing: -0.01em; color: var(--ink); text-decoration: none;
      margin: 44px 0 6px;
    }
    .brand .mark {
      width: 32px; height: 32px; border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, var(--gold), var(--terracotta) 70%);
      box-shadow: inset 0 0 0 3px rgba(247,241,231,0.6);
    }

    h1 {
      font-family: 'Fraunces', Georgia, serif; font-weight: 500;
      font-size: clamp(1.7rem, 5vw, 2.4rem); line-height: 1.15;
      text-align: center; margin-bottom: 8px; padding: 0 20px;
    }
    .sub {
      color: var(--ink-soft); text-align: center; font-size: 1.05rem;
      max-width: 460px; padding: 0 24px; margin-bottom: 30px;
    }

    .form-shell {
      background: #fff; border-radius: 24px;
      box-shadow: 0 18px 50px -22px rgba(58,47,40,0.35);
      border: 1px solid var(--line);
      width: 100%; max-width: 680px;
      padding: 14px; margin: 0 16px;
    }
    .form-shell iframe {
      width: 100%; border: none; display: block; border-radius: 14px;
      height: 897px;
    }

    .fallback {
      text-align: center; font-size: 0.95rem; color: var(--ink-soft);
      margin: 26px 24px;
    }
    .fallback a { color: var(--terracotta); font-weight: 500; }

    footer {
      margin-top: auto; padding: 40px 24px;
      font-size: 0.86rem; color: var(--ink-soft); text-align: center;
    }
    footer a { color: var(--ink-soft); }
  </style>
</head>
<body>

  <a class="brand" href="https://innerlessons.org">
    <span class="mark"></span> Inner Lessons
  </a>

  <h1>Register</h1>
  <p class="sub">Fill out the form below to reserve your spot.</p>

  <div class="form-shell">
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSfzLzSYoYiW7sAW3-yLie2MVv7FUHNdhtOQoVjBbUzu696cjA/viewform?embedded=true"
      title="Inner Lessons registration form"
      loading="lazy">
      Loading…
    </iframe>
  </div>

  <p class="fallback">
    Form not loading?
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfzLzSYoYiW7sAW3-yLie2MVv7FUHNdhtOQoVjBbUzu696cjA/viewform" target="_blank" rel="noopener">
      Open it in a new tab →
    </a>
  </p>

  <footer>
    <a href="https://innerlessons.org">innerlessons.org</a>
  </footer>

</body>
</html>
